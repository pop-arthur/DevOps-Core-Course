- name: Ensure community.docker collection is available (control node hint)
  ansible.builtin.debug:
    msg: "If docker_* modules fail: run 'ansible-galaxy collection install community.docker' on your Mac."

- name: Login to Docker Hub
  community.docker.docker_login:
    registry_url: https://index.docker.io/v1/
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
  no_log: true

- name: Pull image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_image_tag }}"
    source: pull

- name: Remove existing container if any
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent

- name: Run container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    published_ports:
      - "{{ app_port }}:{{ app_port }}"
    env: "{{ app_env }}"
    restart_policy: "{{ app_restart_policy }}"
    state: started
  notify: restart app container

- name: Wait for app port
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ app_port }}"
    delay: 2
    timeout: 60

- name: Health check
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_port }}/health"
    status_code: 200
    return_content: true
  register: healthcheck

- name: Show health response
  ansible.builtin.debug:
    var: healthcheck.content