- name: Install Docker CE and dependencies
  become: true
  tags:
    - docker
    - docker_install
  block:
    - name: Install Docker dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create Docker keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true
      notify: restart docker

    - name: Set Docker apt repo string
      ansible.builtin.set_fact:
        docker_apt_repo: >-
          {{
            'deb [arch=' + (ansible_facts['architecture'] | replace('x86_64', 'amd64'))
            + ' signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu '
            + ansible_facts['distribution_release'] + ' ' + docker_apt_release_channel
          }}

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "{{ docker_apt_repo }}"
        state: present
        filename: docker
      notify: restart docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      notify: restart docker
  rescue:
    - name: Wait before retrying Docker GPG key (network timeout)
      ansible.builtin.pause:
        seconds: 10
        prompt: "Retrying Docker setup..."

    - name: Retry apt cache update
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0

    - name: Retry adding Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true
  always:
    - name: Ensure Docker service is enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

- name: Configure Docker (users and Ansible docker module)
  become: true
  tags:
    - docker
    - docker_config
  block:
    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users | default([]) }}"
      when: docker_users | default([]) | length > 0

    - name: Add ansible_user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Install python3-docker for Ansible docker modules
      ansible.builtin.apt:
        name: python3-docker
        state: present
  always:
    - name: Ensure Docker service is enabled (config block)
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
