services:
  loki:
    image: grafana/loki:3.0.0
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks: [logging]
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  promtail:
    image: grafana/promtail:3.0.0
    command: ["-config.file=/etc/promtail/config.yml"]
    ports:
      - "9080:9080"
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - promtail-positions:/tmp
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [logging]
    depends_on: [loki]
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  grafana:
    image: grafana/grafana:12.3.1
    ports:
      - "3002:3002"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SERVER_HTTP_PORT=3002
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_ALLOW_EMBEDDING=true
    networks: [logging]
    depends_on: [loki]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  devops-info-service:
    image: poparthur/devops-info-service:latest
    ports:
      - "8000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=FALSE
      - SERVICE_NAME=devops-info-service
      - SERVICE_VERSION=1.0.0
    labels:
      logging: "promtail"
      app: "devops-python"
    networks: [logging]
    depends_on: [loki]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

volumes:
  loki-data:
  grafana-data:
  promtail-positions:

networks:
  logging: